<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#00315a" />
  <title>Ginger Healthcare CRM</title>
  <link rel="icon" href="/ginger-logo.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/ginger-logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', -apple-system, sans-serif; background: #f8f9fc; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    ::selection { background: #ff630830; color: #00315a; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8cfd8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #8896a7; }
    input:focus, select:focus, textarea:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
