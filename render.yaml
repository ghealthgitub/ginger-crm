services:
  - type: web
    name: ginger-crm
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ginger-crm-db
          property: connectionString
      - key: CLIENT_URL
        value: https://ginger-crm.onrender.com

databases:
  - name: ginger-crm-db
    plan: free
    databaseName: ginger_crm
